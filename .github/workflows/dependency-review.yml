name: Dependency Review

on:
  pull_request:
    branches: [dev, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
